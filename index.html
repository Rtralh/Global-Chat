<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat - DuduCreator</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: #1e293b; padding: 1rem; border-bottom: 3px solid #38bdf8; display: flex; justify-content: space-between; align-items: center; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: #0ea5e9; border-bottom-right-radius: 2px; }
        .msg.others { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }
        
        .user-tag { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; color: #7dd3fc; }
        
        .footer { background: #1e293b; padding: 1rem; display: flex; gap: 10px; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: white; outline: none; }
        input:focus { border-color: #38bdf8; }
        
        button { background: #38bdf8; color: #0f172a; border: none; padding: 0 20px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #7dd3fc; }
    </style>
</head>
<body>

<header>
    <h1>🌐 Global Chat</h1>
    <span id="status" style="font-size: 0.8rem; color: #22c55e;">● Online</span>
</header>

<div id="chat-window"></div>

<div class="footer">
    <input type="text" id="msgInput" placeholder="Sua mensagem...">
    <button id="sendBtn">ENVIAR</button>
</div>

<script>
    // Configurações do Eduardo Silva integradas
    const firebaseConfig = {
        apiKey: "AIzaSyBKg3qyKLgicXvh7dI8iGaRgsJpT7o6nmQ",
        authDomain: "globalchat-5cf6f.firebaseapp.com",
        databaseURL: "https://globalchat-5cf6f-default-rtdb.firebaseio.com",
        projectId: "globalchat-5cf6f",
        storageBucket: "globalchat-5cf6f.firebasestorage.app",
        messagingSenderId: "687309197485",
        appId: "1:687309197485:web:1038ce8c8257195f57f624"
    };

    // Inicializando o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Identificação do usuário
    const myUser = "User_" + Math.floor(Math.random() * 9999);
    const chatWindow = document.getElementById('chat-window');
    const input = document.getElementById('msgInput');
    const btn = document.getElementById('sendBtn');

    // Função para enviar mensagem para o Banco Global
    function sendMessage() {
        const text = input.value.trim();
        if(text === "") return;

        db.ref("messages").push().set({
            username: myUser,
            message: text,
            timestamp: Date.now()
        });

        input.value = "";
    }

    // Receber mensagens em tempo real de qualquer lugar do mundo
    db.ref("messages").limitToLast(50).on("child_added", (snapshot) => {
        const data = snapshot.val();
        renderMessage(data.message, data.username);
    });

    function renderMessage(text, user) {
        const isMe = user === myUser;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : 'others'}`;
        
        // Exibe "Você" se for sua própria mensagem, senão exibe o ID do outro
        const displayName = isMe ? "Você" : user;
        
        div.innerHTML = `<span class="user-tag">${displayName}</span>${text}`;
        
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Eventos de clique e tecla Enter
    btn.onclick = sendMessage;
    input.onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };
</script>

</body>
</html>
